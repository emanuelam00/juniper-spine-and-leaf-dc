  # ==========================================
  # gNMI/OpenConfig Streaming Telemetry
  # ==========================================

  - job_name: 'gnmi-spines'
    scrape_interval: 10s
    scrape_timeout: 30s
    static_configs:
      - targets:
          - 'spine-01.mgmt.local:50000'
          - 'spine-02.mgmt.local:50000'
          - 'spine-03.mgmt.local:50000'
          - 'spine-04.mgmt.local:50000'
        labels:
          device_type: 'spine'
          collection_method: 'gnmi'

  - job_name: 'gnmi-leaves'
    scrape_interval: 10s
    scrape_timeout: 30s
    static_configs:
      - targets:
          - 'leaf-01.mgmt.local:50000'
          - 'leaf-02.mgmt.local:50000'
          - 'leaf-03.mgmt.local:50000'
          - 'leaf-04.mgmt.local:50000'
          - 'leaf-05.mgmt.local:50000'
          - 'leaf-06.mgmt.local:50000'
