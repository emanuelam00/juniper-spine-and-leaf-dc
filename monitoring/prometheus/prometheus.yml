          role: 'spine'
          asn: '65000'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'localhost:9116'

  # Spine-03 (10.255.0.3)
  - job_name: 'snmp-spine-03'
    scrape_interval: 5m
    scrape_timeout: 30s
    metrics_path: /snmp
    params:
