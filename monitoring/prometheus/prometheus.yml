# Prometheus Configuration for Juniper Spine-Leaf Fabric
# Production-ready configuration with SNMP exporter targets

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'dc-fabric-primary'
    environment: 'production'
    datacenter: 'us-west-2'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'

# Load alerting rules
rule_files:
  - '/etc/prometheus/alert_rules.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9090']
        labels:
          device_type: 'monitoring'

  # ==========================================
  # SPINE SWITCHES
  # ==========================================

  # Spine-01 (10.255.0.1)
  - job_name: 'snmp-spine-01'
    scrape_interval: 5m
    scrape_timeout: 30s
    metrics_path: /snmp
    params:
      module: [juniper_device]
    static_configs:
      - targets: ['10.255.0.1']
        labels:
          device_name: 'spine-01'
          device_type: 'spine'
          device_model: 'QFX5220-32CD'
          management_ip: '10.255.0.1'
          role: 'spine'
          asn: '65000'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'localhost:9116'  # SNMP exporter address

  # Spine-02 (10.255.0.2)
  - job_name: 'snmp-spine-02'
    scrape_interval: 5m
    scrape_timeout: 30s
    metrics_path: /snmp
    params:
      module: [juniper_device]
    static_configs:
      - targets: ['10.255.0.2']
        labels:
