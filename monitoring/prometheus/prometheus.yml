  # ==========================================
  # LEAF SWITCHES (10.255.1.1 - 10.255.1.60)
  # ==========================================

  # Leaf-01 through Leaf-10
  - job_name: 'snmp-leaves-01-10'
    scrape_interval: 5m
    scrape_timeout: 30s
    metrics_path: /snmp
    params:
      module: [juniper_device]
    static_configs:
      - targets:
          - '10.255.1.1'
          - '10.255.1.2'
          - '10.255.1.3'
          - '10.255.1.4'
          - '10.255.1.5'
          - '10.255.1.6'
          - '10.255.1.7'
          - '10.255.1.8'
          - '10.255.1.9'
          - '10.255.1.10'
        labels:
          device_type: 'leaf'
          device_model: 'QFX5120-48Y'
          role: 'leaf'
          asn: '65100'
          rack: 'A'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 'localhost:9116'
      - source_labels: [__param_target]
        regex: '10\.255\.1\.(\d+)'
        replacement: 'leaf-0${1}'
        target_label: device_name

