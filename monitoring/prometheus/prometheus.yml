          - 'leaf-09.mgmt.local:50000'
          - 'leaf-10.mgmt.local:50000'
        labels:
          device_type: 'leaf'
          collection_method: 'gnmi'

  # ==========================================
  # Telegraf Collector Output
  # ==========================================

  - job_name: 'telegraf-metrics'
    scrape_interval: 10s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:9273']
        labels:
          collector: 'telegraf'
          collection_method: 'push'

  # ==========================================
  # Node Exporter (Infrastructure Monitoring)
  # ==========================================

  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'localhost:9100'
          - 'monitoring-backup.mgmt.local:9100'
        labels:
          job_type: 'infrastructure'

  # ==========================================
  # Docker Container Metrics
  # ==========================================

  - job_name: 'docker'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9323']
        labels:
          job_type: 'infrastructure'

# ==========================================
# SNMP Exporter Module Configuration
# (Separate snmp_exporter.yml file)
# ==========================================
#
# The SNMP exporter should be configured with module:
#
# juniper_device:
#   walk:
#     - interfaces
#     - system
#     - ip
#     - tcp
#     - udp
#     - icmp
#     - snmp
#     - ifXTable
#     - entitySensor
#     - entityMIB
#     - jnxChassis
#     - jnxOperating
#     - jnxBgp
#     - jnxExOptical
#   version: 3
#   max_repetitions: 25
#   timeout: 10s
#   retries: 3
#   auth:
#     security_level: authPriv
#     username: monitoring
#     auth_protocol: MD5
#     auth_password: ChangeMe123!
#     priv_protocol: AES
#     priv_password: ChangeMe456!
