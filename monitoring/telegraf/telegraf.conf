# Telegraf Configuration for Juniper Spine-Leaf Fabric Monitoring
# Production-ready multi-input/output configuration

[global_tags]
  cluster = "dc-fabric-primary"
  datacenter = "us-west-2"
  environment = "production"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "ns"
  debug = false
  quiet = false
  logfile = "/var/log/telegraf/telegraf.log"
  hostname = "telegraf-collector-01"
  omit_hostname = false

# ==========================================
# OUTPUT PLUGINS
# ==========================================

# Prometheus Remote Write Output
[[outputs.prometheus_client]]
  listen = ":9273"
  path = "/metrics"
  string_as_label = false
  metric_version = 2
  collectors_exclude = ["gocollector", "process"]

# InfluxDB v2 Output (optional backup)
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "your-influxdb-token"
  organization = "datacenter"
  bucket = "fabric-metrics"
  timeout = "5s"

# ==========================================
# INPUT PLUGINS
# ==========================================

# ==========================================
# SNMP INPUT PLUGIN - Spine Devices
# ==========================================

[[inputs.snmp]]
  name = "snmp-spine-01"
  agents = ["10.255.0.1:161"]
  version = 3
  max_repetitions = 25
  timeout = "10s"
  retries = 3

  # SNMPv3 Authentication
  sec_level = "authPriv"
  sec_name = "monitoring"
  auth_protocol = "MD5"
  auth_password = "ChangeMe123!"
  priv_protocol = "AES"
  priv_password = "ChangeMe456!"

  # Common System OIDs
  [[inputs.snmp.field]]
    oid = "SNMPv2-MIB::sysUpTime.0"
    name = "uptime"
    conversion = "float"

  [[inputs.snmp.field]]
    oid = "SNMPv2-MIB::sysDescr.0"
    name = "sysDescr"
    conversion = "string"

  # CPU and Memory (Juniper MIB)
  [[inputs.snmp.field]]
    oid = "JUNIPER-MIB::jnxOperatingCPU"
    name = "cpu_utilization"
    conversion = "float"

  [[inputs.snmp.field]]
    oid = "JUNIPER-MIB::jnxOperatingMemory"
    name = "memory_utilization"
    conversion = "float"

  [[inputs.snmp.field]]
    oid = "JUNIPER-MIB::jnxOperatingTemperature"
    name = "temperature"
    conversion = "float"

  # Interface Statistics
  [[inputs.snmp.table]]
    oid = "IF-MIB::ifTable"
    name = "interface"
    inherit_tags = ["device_name"]

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifIndex"
      name = "ifIndex"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifName"
      name = "ifName"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifDescr"
      name = "ifDescr"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOperStatus"
      name = "ifOperStatus"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifInOctets"
      name = "ifInOctets"
      conversion = "float"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOutOctets"
      name = "ifOutOctets"
      conversion = "float"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifInErrors"
      name = "ifInErrors"
      conversion = "float"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOutErrors"
      name = "ifOutErrors"
      conversion = "float"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifInDiscards"
      name = "ifInDiscards"
      conversion = "float"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOutDiscards"
      name = "ifOutDiscards"
      conversion = "float"

  # Extended Interface Statistics (High-Speed)
  [[inputs.snmp.table]]
    oid = "IF-MIB::ifXTable"
    name = "interface_extended"
    inherit_tags = ["device_name"]

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifHighSpeed"
      name = "ifHighSpeed"
      conversion = "float"

  # BGP Peer Statistics
  [[inputs.snmp.table]]
    oid = "BGP4-MIB::bgpPeerTable"
    name = "bgp_peer"
    inherit_tags = ["device_name"]

    [[inputs.snmp.table.field]]
      oid = "BGP4-MIB::bgpPeerLocalAddr"
      name = "bgpPeerLocalAddr"

    [[inputs.snmp.table.field]]
      oid = "BGP4-MIB::bgpPeerRemoteAddr"
      name = "bgpPeerRemoteAddr"

    [[inputs.snmp.table.field]]
      oid = "BGP4-MIB::bgpPeerRemoteAs"
      name = "bgpPeerRemoteAs"

    [[inputs.snmp.table.field]]
      oid = "BGP4-MIB::bgpPeerState"
      name = "bgpPeerState"

    [[inputs.snmp.table.field]]
      oid = "BGP4-MIB::bgpPeerInUpdates"
      name = "bgpPeerInUpdates"
      conversion = "float"

    [[inputs.snmp.table.field]]
      oid = "BGP4-MIB::bgpPeerOutUpdates"
      name = "bgpPeerOutUpdates"
      conversion = "float"

  [inputs.snmp.tags]
    device_name = "spine-01"
    device_type = "spine"
    device_model = "QFX5220-32CD"
    management_ip = "10.255.0.1"
    asn = "65000"

# ==========================================
# SNMP INPUT PLUGIN - Leaf Devices
# (Sample configuration for leaves 01-10; expand for all 60)
# ==========================================

[[inputs.snmp]]
  name = "snmp-leaves"
  agents = [
    "10.255.1.1:161",
    "10.255.1.2:161",
    "10.255.1.3:161",
    "10.255.1.4:161",
    "10.255.1.5:161",
    "10.255.1.6:161",
    "10.255.1.7:161",
    "10.255.1.8:161",
    "10.255.1.9:161",
    "10.255.1.10:161"
  ]
  version = 3
  max_repetitions = 25
  timeout = "10s"
  retries = 3

  # SNMPv3 Authentication
  sec_level = "authPriv"
  sec_name = "monitoring"
  auth_protocol = "MD5"
  auth_password = "ChangeMe123!"
  priv_protocol = "AES"
  priv_password = "ChangeMe456!"

  # System OIDs
  [[inputs.snmp.field]]
    oid = "SNMPv2-MIB::sysUpTime.0"
    name = "uptime"
    conversion = "float"

  [[inputs.snmp.field]]
    oid = "JUNIPER-MIB::jnxOperatingCPU"
    name = "cpu_utilization"
    conversion = "float"

  [[inputs.snmp.field]]
    oid = "JUNIPER-MIB::jnxOperatingMemory"
    name = "memory_utilization"
    conversion = "float"

  [[inputs.snmp.field]]
    oid = "JUNIPER-MIB::jnxOperatingTemperature"
    name = "temperature"
    conversion = "float"

  # Interface Statistics (same as spines)
  [[inputs.snmp.table]]
    oid = "IF-MIB::ifTable"
    name = "interface"
    inherit_tags = ["device_type"]

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifIndex"
      name = "ifIndex"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifName"
      name = "ifName"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOperStatus"
      name = "ifOperStatus"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifInOctets"
      name = "ifInOctets"
      conversion = "float"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOutOctets"
      name = "ifOutOctets"
      conversion = "float"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifInErrors"
      name = "ifInErrors"
      conversion = "float"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOutErrors"
      name = "ifOutErrors"
      conversion = "float"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifInDiscards"
      name = "ifInDiscards"
      conversion = "float"

    [[inputs.snmp.table.field]]
      oid = "IF-MIB::ifOutDiscards"
      name = "ifOutDiscards"
      conversion = "float"

  [inputs.snmp.tags]
    device_type = "leaf"
    device_model = "QFX5120-48Y"
    asn = "65100"

# ==========================================
# GNMI (STREAMING TELEMETRY) INPUT
# ==========================================

[[inputs.gnmi]]
  addresses = [
    "spine-01.mgmt.local:50000",
    "spine-02.mgmt.local:50000",
    "spine-03.mgmt.local:50000",
    "spine-04.mgmt.local:50000"
  ]
  username = "monitoring"
  password = "ChangeMe123!"
  redial = "10s"
  keepalive = "30s"

  # Interface Statistics Subscription
  [[inputs.gnmi.subscription]]
    name = "interface-stats"
    origin = "openconfig-interfaces"
    path = "/interfaces/interface/state/counters"
    subscription_mode = "STREAM"
    sample_interval = 10000000000  # 10 seconds in nanoseconds

  # BGP State Subscription
  [[inputs.gnmi.subscription]]
    name = "bgp-state"
    origin = "openconfig-bgp"
    path = "/bgp/neighbors/neighbor/state"
    subscription_mode = "ON_CHANGE"

  # System Health Subscription
  [[inputs.gnmi.subscription]]
    name = "system-health"
    origin = "openconfig-system"
    path = "/system"
    subscription_mode = "SAMPLE"
    sample_interval = 10000000000

  [inputs.gnmi.tags]
    source = "gnmi"
    collection_method = "streaming_telemetry"

# ==========================================
# SYSLOG INPUT PLUGIN
# ==========================================

[[inputs.syslog]]
  protocol = "tcp"
  address = "0.0.0.0:514"
  timestamp_format = "RFC3164"
  best_effort = true

  [inputs.syslog.tags]
    source = "syslog"

# ==========================================
# SYSTEM MONITORING (LOCAL COLLECTOR HOST)
# ==========================================

[[inputs.cpu]]
  percpu = true
  metrics = ["usage_active", "usage_iowait"]
  collect_cpu_time = false

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.diskio]]

[[inputs.mem]]

[[inputs.processes]]

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  container_names = ["telegraf", "prometheus", "grafana", "alertmanager", "snmp-exporter", "loki"]

[[inputs.net]]

[[inputs.netstat]]

# ==========================================
# PROCESSOR PLUGINS
# ==========================================

# Convert SNMP field values to appropriate types
[[processors.converter]]
  [processors.converter.fields]
    float = ["cpu_utilization", "memory_utilization", "temperature", "ifInOctets", "ifOutOctets", "ifInErrors", "ifOutErrors"]
    integer = ["ifOperStatus", "bgpPeerState"]
    string = ["ifName", "ifDescr", "bgpPeerRemoteAddr"]

# Add tags for easier querying
[[processors.rename]]
  [[processors.rename.replace]]
    field = "ifName"
    dest = "interface_name"

# ==========================================
# AGGREGATORS (OPTIONAL)
# ==========================================

# Aggregate metrics by device for summary metrics
[[aggregators.valuecounter]]
  name_suffix = "_total_count"
  fields = ["ifOperStatus"]

# ==========================================
# CONFIGURATIONS FOR DOCKER DEPLOYMENT
# ==========================================

# Configuration can be passed via environment variables:
# TELEGRAF_SNMP_AGENTS - comma-separated list of SNMP agents
# TELEGRAF_GNMI_ADDRESSES - comma-separated list of gNMI addresses
# TELEGRAF_SNMP_PASSWORD - SNMPv3 password
# TELEGRAF_GNMI_PASSWORD - gNMI password
