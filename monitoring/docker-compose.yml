version: '3.8'

# Docker Compose Configuration for Juniper Spine-Leaf Fabric Monitoring Stack
# Production-ready monitoring and observability infrastructure

services:
  # ==========================================
  # PROMETHEUS - Time-Series Database & Alerting Engine
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    environment:
      TZ: UTC
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # ALERTMANAGER - Alert Routing & Management
  # ==========================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://alertmanager:9093/'
    environment:
      TZ: UTC
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # GRAFANA - Visualization & Dashboarding
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/fabric-overview.json:/etc/grafana/provisioning/dashboards/fabric-overview.json:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GF_USER:-admin}
      GF_INSTALL_PLUGINS: 'grafana-worldmap-panel,grafana-piechart-panel'
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_DISABLE_LOGIN_FORM: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      GF_PANELS_ENABLE_ALPHA: 'true'
      TZ: UTC
    networks:
      - monitoring
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # TELEGRAF - Multi-Source Metrics Collector
  # ==========================================
  telegraf:
    image: telegraf:latest
    container_name: telegraf
    restart: unless-stopped
    ports:
      - "9273:9273"
      - "514:514/udp"  # Syslog input
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TELEGRAF_SNMP_PASSWORD: ${SNMP_PASSWORD:-ChangeMe123!}
      TELEGRAF_GNMI_PASSWORD: ${GNMI_PASSWORD:-ChangeMe123!}
      TZ: UTC
    networks:
      - monitoring
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9273/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # SNMP EXPORTER - SNMP to Prometheus Bridge
  # ==========================================
  snmp-exporter:
    image: prom/snmp-exporter:latest
    container_name: snmp-exporter
    restart: unless-stopped
    ports:
      - "9116:9116"
    volumes:
      - ./snmp-exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro
    command:
      - '--config.file=/etc/snmp_exporter/snmp.yml'
      - '--log.level=info'
    environment:
      TZ: UTC
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9116/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # LOKI - Log Aggregation & Storage
  # ==========================================
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    command:
      - '-config.file=/etc/loki/local-config.yml'
    environment:
      TZ: UTC
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/loki/api/v1/status/buildinfo"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # PROMTAIL - Syslog to Loki Agent
  # ==========================================
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    ports:
      - "1514:514"  # Syslog port (promtail)
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
    command:
      - '-config.file=/etc/promtail/config.yml'
    environment:
      TZ: UTC
    networks:
      - monitoring
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3101/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # INFLUXDB - Optional Time-Series Database
  # ==========================================
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      INFLUXDB_DB: fabric_metrics
      INFLUXDB_ADMIN_USER: ${INFLUX_USER:-admin}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUX_PASSWORD:-admin}
      INFLUXDB_HTTP_AUTH_ENABLED: 'true'
      TZ: UTC
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8086/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # POSTGRES - Optional Backend for Alertmanager & Loki
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: monitoring
      TZ: UTC
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================
  # NODE EXPORTER - Local System Metrics
  # ==========================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.textfile.directory=/etc/node_exporter/'
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9100/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # CADVISOR - Docker Container Monitoring
  # ==========================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ==========================================
# VOLUMES
# ==========================================
volumes:
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  influxdb_data:
    driver: local
  postgres_data:
    driver: local

# ==========================================
# NETWORKS
# ==========================================
networks:
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==========================================
# USAGE INSTRUCTIONS
# ==========================================
#
# 1. Start the stack:
#    docker-compose up -d
#
# 2. Access services:
#    - Prometheus: http://localhost:9090
#    - Grafana: http://localhost:3000 (admin/admin)
#    - Alertmanager: http://localhost:9093
#    - Loki: http://localhost:3100
#    - InfluxDB: http://localhost:8086
#
# 3. Environment variables (create .env file):
#    GF_PASSWORD=your-grafana-password
#    GF_USER=admin
#    SNMP_PASSWORD=your-snmp-password
#    GNMI_PASSWORD=your-gnmi-password
#    INFLUX_USER=admin
#    INFLUX_PASSWORD=your-influx-password
#    POSTGRES_USER=admin
#    POSTGRES_PASSWORD=your-postgres-password
#
# 4. View logs:
#    docker-compose logs -f [service-name]
#
# 5. Stop the stack:
#    docker-compose down
#
# 6. Backup data:
#    docker-compose exec prometheus tar czf /tmp/prometheus.tar.gz /prometheus
#    docker-compose cp prometheus:/tmp/prometheus.tar.gz ./backups/
#
# ==========================================
# CONFIGURATION FILES REQUIRED
# ==========================================
#
# Create the following configuration files before starting:
#
# monitoring/prometheus/prometheus.yml
# monitoring/prometheus/alert_rules.yml
# monitoring/alertmanager/alertmanager.yml
# monitoring/telegraf/telegraf.conf
# monitoring/snmp-exporter/snmp.yml
# monitoring/loki/loki-config.yml
# monitoring/promtail/promtail-config.yml
# monitoring/grafana/provisioning/datasources/prometheus.yml
# monitoring/grafana/provisioning/dashboards/fabric-overview.json
