routing-options {
    autonomous-system 65000;
    router-id 10.0.0.2;
    forwarding-table {
        ecmp-fast-reroute;
        export underlay-ecmp;
    }
    graceful-restart { restart-time 300; }
}

policy-options {
    prefix-list loopback { 10.0.0.2/32; }
    prefix-list connected-subnets { 10.1.0.0/16; 10.2.0.0/16; }
    policy-statement underlay-out {
        description "Export loopback and connected routes to eBGP peers";
        term loopback { from { prefix-list loopback; } then accept; }
        term connected { from { prefix-list connected-subnets; } then accept; }
        then reject;
    }
    policy-statement underlay-in { description "Import all routes from eBGP peers"; then accept; }
    policy-statement RR-out { description "Export EVPN routes to RR clients"; from { family evpn; } then accept; }
    policy-statement RR-in { description "Import EVPN routes from RR clients"; from { family evpn; } then accept; }
    policy-statement underlay-ecmp {
        description "Configure per-flow hashing for ECMP";
        term ecmp-hash { then { load-balance per-flow; } }
    }
}

firewall {
    family inet {
        filter protect-loopback {
            description "Protect loopback from unauthorized access";
            term allow-bgp { from { destination-address { 10.0.0.2/32; } protocol tcp; destination-port bgp; } then accept; }
            term allow-bfd { from { destination-address { 10.0.0.2/32; } protocol udp; destination-port 3784-3785; } then accept; }
            term allow-ssh { from { destination-address { 10.0.0.2/32; } protocol tcp; destination-port ssh; } then accept; }
            term allow-snmp { from { destination-address { 10.0.0.2/32; } protocol udp; destination-port snmp; } then accept; }
            term allow-ntp { from { destination-address { 10.0.0.2/32; } protocol udp; destination-port ntp; } then accept; }
            term allow-icmp { from { destination-address { 10.0.0.2/32; } protocol icmp; } then accept; }
            term allow-netconf { from { destination-address { 10.0.0.2/32; } protocol tcp; destination-port 830; } then accept; }
            term deny-rest { then { discard; } }
        }
    }
}

system {
    services {
        ssh {
            protocol-version v2;
            authentication-order password;
            root-login deny;
            max-sessions-per-connection 32;
            max-concurrent-sessions 32;
            rate-limit 5;
        }
        netconf { ssh; max-concurrent-sessions 32; }
    }
}

chassis {
    aggregated-devices {
        ethernet { device-count 0; }
    }
}
