## JunOS Configuration: dc1-spine-02
## QFX5220-32CD | Spine-Leaf Datacenter Fabric
## eBGP Underlay (ASN 65000) + iBGP EVPN Overlay
## Generated: 2026-03-25

version 20.4R1;

system {
    host-name dc1-spine-02;
    domain-name datacenter.local;
    time-zone UTC;
    root-authentication {
        encrypted-password "$6$PLACEHOLDER";
    }
    login {
        banner {
            "Juniper Networks Datacenter Spine Switch
Authorized access only. All activity is monitored and logged.";
        }
    }
    name-server {
        10.255.0.250;
        10.255.0.251;
    }
    ntp {
        server 10.255.0.250 prefer;
        server 10.255.0.251;
    }
    syslog {
        archive size 100m files 10;
        file messages {
            any notice;
            authorization info;
        }
        file traffic_log {
            traffic any;
        }
        host 10.255.0.252 {
            any info;
            port 514;
        }
    }
    snmp {
        engine-id 00:00:00:00:00:00:00:00:00:00:00:00;
        v3 {
            usm {
                local-engine {
                    user netmon {
                        authentication-type sha;
                        authentication-key "$9$PLACEHOLDER";
                        privacy-type aes128;
                        privacy-key "$9$PLACEHOLDER";
                    }
                }
            }
            vacm {
                security-group sg_netmon {
                    security-model usm;
                    security-level authentication;
                    member netmon;
                }
                access {
                    group sg_netmon {
                        default-context-prefix {
                            read-view v_all;
                        }
                    }
                }
            }
            view v_all {
                oid 1.3.6.1.2.1 restricted;
            }
        }
        trap-options {
            source-address 10.0.0.2;
        }
    }
    login-user netadmin {
        uid 2001;
        class super-user;
        authentication {
            encrypted-password "$6$PLACEHOLDER";
        }
    }
}

