        description "ESI-LAG to servers in Rack-21";
        mtu 9216;
        esi {
            auto-derive lacp;
        }
        aggregated-ether-options {
            lacp {
                active;
                periodic slow;
                system-priority 32727;
                system-id 00:01:01:01:01:15;
            }
        }
        unit 0 {
            family ethernet-switching {
                interface-mode trunk;
                vlan {
                    members VLAN-100;
                    members VLAN-200;
                    members VLAN-300;
                }
                storm-control {
                    all {
                        bandwidth-percentage 10;
                    }
                }
            }
        }
    }

