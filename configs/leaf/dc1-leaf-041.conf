## JunOS Configuration Template for QFX5120-48Y Leaf Switches
## EVPN-VXLAN Spine-Leaf Fabric
## Generated via Jinja2 template - DO NOT EDIT MANUALLY

system {
    host-name dc1-leaf-041;
    domain-name datacenter.local;
    time-zone UTC;
    root-authentication {
        encrypted-password "$6$JbR/Z9H2$abcdef1234567890/salt/hash/example";
    }
    name-server {
        10.255.0.250;
        10.255.0.251;
    }
    ntp {
        server 10.255.0.250;
        server 10.255.0.251;
    }
    syslog {
        user * {
            any emergency;
        }
        file messages {
            any notice;
            authorization info;
        }
        file traffic_log {
            pfe {
                any any;
            }
        }
        host 10.255.0.252 {
            any info;
            port 514;
        }
    }
    login {
        banner login "=== dc1-leaf-041 - Datacenter Spine-Leaf Fabric ===\nUnauthorized access is prohibited and will be prosecuted by law.";
    }
    services {
        ssh {
            root-login deny;
            protocol-version v2;
            log-key-changes;
        }
        netconf {
            ssh;
        }
        snmp {
            description "dc1-leaf-041 - QFX5120-48Y Leaf Switch";
            contact "Network Operations";
            location "Datacenter 1";
            community public {
                authorization read-only;
            }
            v3 {
                usm {
                    local-engine {
                        user snmp-user {
                            authentication-md5 {
                                authentication-key "juniper-snmp-auth-key";
                            }
                            privacy-3des {
                                privacy-key "juniper-snmp-privacy-key";
                            }
                        }
                    }
                }
                vacm {
                    security-to-group {
                        security-model usm {
                            security-name snmp-user {
                                group-name SNMP-USM-GROUP;
                            }
                        }
                    }
                    access {
                        group SNMP-USM-GROUP {
                            default-context-prefix {
                                read-view all;
                                notify-view all;
                            }
                        }
                    }
                }
                view all {
                    oid .1 {
                        restriction "";
                    }
                }
            }
            trap-options {
                source-address 10.0.1.41;
            }
        }
    }
    management {
        event-options {
            policy SYSLOG_ALERT {
                events [ ui_login_event ui_logout_event ];
                then {
                    syslog;
                }
            }
        }
    }
}

