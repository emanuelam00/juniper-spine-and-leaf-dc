firewall {
    filter COPP-FILTER {
        term ALLOW_BGP {
            from {
                protocol tcp;
                destination-port 179;
            }
            then accept;
        }
        term ALLOW_BFD {
            from {
                protocol udp;
                destination-port 3784;
            }
            then accept;
        }
        term ALLOW_SSH {
            from {
                protocol tcp;
                destination-port 22;
            }
            then accept;
        }
        term ALLOW_NETCONF {
            from {
                protocol tcp;
                destination-port 830;
            }
            then accept;
        }
        term ALLOW_SNMP {
            from {
                protocol udp;
                destination-port 161;
            }
            then accept;
        }
        term ALLOW_NTP {
            from {
                protocol udp;
                destination-port 123;
            }
            then accept;
        }
        term DISCARD_REST {
            then discard;
        }
    }
}

routing-options {
    router-id 10.0.1.41;
    autonomous-system 65041;
    forwarding-table {
        export [ LOAD-BALANCE ];
    }
    static {
        route 0.0.0.0/0 next-hop 10.255.1.1;
    }
}

policy-options {
    policy-statement LOAD-BALANCE {
        then {
            load-balance per-packet;
        }
    }

    policy-statement EXPORT-LOOPBACK {
        term loopback {
            from {
                route-filter 10.0.1.41/32 exact;
            }
            then accept;
        }
        term direct {
            from {
                protocol direct;
            }
            then accept;
        }
    }

    policy-statement REJECT-DEFAULT {
        term no-default {
            from {
                route-filter 0.0.0.0/0 exact;
            }
            then reject;
        }
        term accept-rest {
            then accept;
        }
    }

    policy-statement EVPN-IMPORT-POLICY {
        term import-evpn {
            then accept;
        }
    }

    policy-statement EVPN-EXPORT-POLICY {
        term export-evpn {
            then accept;
        }
    }
}

protocols {
    bfd {
        minimum-interval 300;
        multiplier 3;
    }

    bgp {
        log-updown;
        graceful-restart {
            restart-time 120;
        }
        group SPINE-UNDERLAY {
            type external;
            mtu-discovery;
            import [ REJECT-DEFAULT ];
            export [ EXPORT-LOOPBACK ];
            multipath {
                multiple-as;
            }
            bfd-liveness-detection {
                minimum-interval 300;
                multiplier 3;
                session-mode automatic;
            }            neighbor 10.1.1.80 {
                description "eBGP to dc1-spine-01";
                peer-as 65000;
            }            neighbor 10.1.2.80 {
                description "eBGP to dc1-spine-02";
                peer-as 65000;
            }            neighbor 10.1.3.80 {
                description "eBGP to dc1-spine-03";
                peer-as 65000;
            }            neighbor 10.1.4.80 {
                description "eBGP to dc1-spine-04";
                peer-as 65000;
            }        }

        group SPINE-OVERLAY {
            type external;
            multihop {
                ttl 2;
            }
            local-address 10.0.1.41;
            family evpn {
                signaling {
                    graceful-restart;
                }
            }
            multipath;
            graceful-restart {
                restart-time 120;
            }
            log-updown;            neighbor 10.0.0.1 {
                description "eBGP EVPN to dc1-spine-01";
                peer-as 65000;
            }            neighbor 10.0.0.2 {
                description "eBGP EVPN to dc1-spine-02";
                peer-as 65000;
            }            neighbor 10.0.0.3 {
                description "eBGP EVPN to dc1-spine-03";
                peer-as 65000;
            }            neighbor 10.0.0.4 {
                description "eBGP EVPN to dc1-spine-04";
                peer-as 65000;
            }        }
    }

    evpn {
        encapsulation vxlan;
        extended-vni-list [ 10100 10200 10300 ];
        multicast-mode ingress-replication;
        vni-options {
            vni 10100 {
                vrf-target target:65041:10100;
            }
            vni 10200 {
                vrf-target target:65041:10200;
            }
            vni 10300 {
                vrf-target target:65041:10300;
            }
        }
    }

    lldp {
        management-address 10.0.1.41;
        advertisement-interval 30;
        hold-time-multiplier 4;
        interface ae0 {
            disable;
        }
        interface all {
            enable;
        }
    }
}

vlans {
    VLAN-100 {
        vlan-id 100;
        description "Tenant 1 - Application VLAN";
        vxlan {
            vni 10100;
        }
        l3-interface irb.100;
    }
    VLAN-200 {
        vlan-id 200;
        description "Tenant 1 - Database VLAN";
        vxlan {
            vni 10200;
        }
        l3-interface irb.200;
    }
    VLAN-300 {
        vlan-id 300;
        description "Tenant 1 - Storage VLAN";
        vxlan {
            vni 10300;
        }
        l3-interface irb.300;
    }
}

class-of-service {
    forwarding-classes {
        class "queue-0" queue-num 0;
        class "queue-1" queue-num 1;
        class "queue-2" queue-num 2;
        class "queue-3" queue-num 3;
    }
}

routing-instances {
    TENANT-1 {
        instance-type vrf;
        protocols {
            bgp {
                graceful-restart;
            }
            evpn {
                ip-prefix-routes {
                    advertise policy-map leaf-routes;
                    encapsulation vxlan;
                    vni 50001;
                }
            }
        }
        vrf-target {
            target:65041:50001;
            target:65041:50001 import;
        }
        vrf-table-label;
        routing-options {
            autonomous-system 65041;
            static {
                route 0.0.0.0/0 next-hop 10.255.1.1;
            }
        }
        interfaces {
            irb.100;
            irb.200;
            irb.300;
        }
    }
}

# Apply CoPP filter to loopback
apply-groups-except [ EXCLUDE ];
groups {
    COPP-POLICY {
        interfaces {
            lo0 {
                unit 0 {
                    family inet {
                        filter {
                            input COPP-FILTER;
                        }
                    }
                }
            }
        }
    }
}